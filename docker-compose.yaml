services:
  postgres_container:
    image: postgres:15-alpine
    container_name: postgres_container
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 3s
      retries: 2

  flask_crud_app_v1:
    build: .
    container_name: flask_container_v1
    env_file:
      - .env
    depends_on:
      postgres_container:
        condition: service_healthy
  
volumes:
  postgres_data:
  
#pg_isready POSTGRES utility to check the server is ready or not 
#CMD-shell - /bin/sh -c