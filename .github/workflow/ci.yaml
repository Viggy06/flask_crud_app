name: CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    name: Building docker image
    runs-on: ubuntu-latest #runner environment

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      
      - name: Build Docker Image
        run: docker build -t flask_crud_app:${{ github.sha }} .
  
  validate:
    name: Validate docker image
    runs-on: ubuntu-latest
    needs: build #Validate if build job is completed

    steps:
      - name: Validating docker image
        run: docker run --rm flask_crud_app:${{ github.sha }}


